# GitHub Actions: секреты, сборка, фаззинг, проверка контейнера, публикация в GHCR
# Публикация образа — только после успешной проверки безопасности

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY: ghcr.io

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -B -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  fuzzing:
    name: Web Fuzzing
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
      - name: Start application
        run: |
          JAR=$(ls *.jar | head -1)
          java -jar $JAR &
          for i in $(seq 1 30); do
            sleep 2
            curl -sf http://localhost:8080/ && break
          done
      - name: Install ffuf
        run: |
          curl -sL https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz | tar xz
          chmod +x ffuf
          sudo mv ffuf /usr/local/bin/
      - name: Run fuzzing
        run: |
          ffuf -u http://localhost:8080/FUZZ -w .github/wordlists/dirs.txt -mc 200,301,302,404 -o fuzzing-results.json -of json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fuzzing-results
          path: fuzzing-results.json

  docker:
    name: Build & Scan Container
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
      - run: mkdir -p target && cp app-jar/*.jar target/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository }}:latest .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:latest
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Push to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: docker push ${{ env.REGISTRY }}/${{ github.repository }}:latest
