# GitHub Actions pipeline с поиском секретов
# Поиск секретов выполняется ДО сборки и останавливает workflow при обнаружении

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # === Job 1: Обнаружение секретов (Gitleaks) ===
  # Выполняется первым. При обнаружении секретов workflow завершится с ошибкой.
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Полная история для сканирования

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # === Job 2: Сборка приложения ===
  # Выполняется только после успешной проверки на секреты (needs: secret-detection)
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B
